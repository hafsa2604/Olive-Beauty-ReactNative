$kind: http-request
description: Sends a secure password reset email via Firebase Auth to the specified email address.
url: "{{baseUrl}}/api/auth/reset-password"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "email": "jane.doe@example.com"
    }
order: 3000
